<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <radialGradient id="bg" cx="50%" cy="60%" r="70%">
      <stop offset="0%" stop-color="#020d30"/>
      <stop offset="100%" stop-color="#000510"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <ellipse cx="960" cy="540" rx="800" ry="400" fill="url(#glow)"/>
  <!-- Subtle grid lines -->
  <line x1="0" y1="360" x2="1920" y2="360" stroke="#00e5ff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="720" x2="1920" y2="720" stroke="#00e5ff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="1080" stroke="#00e5ff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="1280" y1="0" x2="1280" y2="1080" stroke="#00e5ff" stroke-opacity="0.03" stroke-width="1"/>
</svg>
