<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 130" fill="none">
  <defs>
    <style>
      .ring { fill: none; stroke: #00e5ff; stroke-width: 7; opacity: 0.9; }
    </style>
  </defs>
  <!-- 5 Olympic-style interlocking rings -->
  <!-- Top row: rings 1, 3, 5 -->
  <circle class="ring" cx="40"  cy="50" r="30"/>
  <circle class="ring" cx="100" cy="50" r="30"/>
  <circle class="ring" cx="160" cy="50" r="30"/>
  <!-- Bottom row: rings 2, 4 -->
  <circle class="ring" cx="70"  cy="80" r="30"/>
  <circle class="ring" cx="130" cy="80" r="30"/>
</svg>
